<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>生物化学知识图谱 - 数据驱动版</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="graph-data.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f4f6fb;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei';overflow:hidden}
.hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:#ffffffcc;backdrop-filter:blur(10px);border-bottom:1px solid #e5e7eb;position:relative;z-index:10}
.hdr h1{font-size:18px;font-weight:600}
.badge{margin-left:10px;font-size:12px;padding:4px 10px;background:#eef2ff;color:#4f46e5;border-radius:20px}
.si{padding:8px 12px;border-radius:10px;border:1px solid #e5e7eb;outline:none;width:200px}
.btn{padding:8px 14px;border:none;background:#f1f5f9;border-radius:10px;cursor:pointer;margin-left:6px;font-size:13px}
.btn.active{background:#3b82f6;color:#fff}
svg{background:radial-gradient(circle,#ffffff,#eef2f7)}

/* 左侧图例 */
.leg{position:fixed;bottom:20px;left:20px;background:#ffffffdd;backdrop-filter:blur(10px);border-radius:12px;padding:14px 16px;font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,.08);user-select:none;max-height:60vh;overflow-y:auto}
.leg-title{font-weight:600;margin-bottom:8px;font-size:12px;color:#64748b}
.leg-item{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:8px;cursor:pointer;transition:background .15s;margin-bottom:2px}
.leg-item:hover{background:#f1f5f9}
.leg-item.active{background:#f0f4ff}
.leg-dot{width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.15);flex-shrink:0}
.leg-item.disabled .leg-dot{opacity:.3}
.leg-item.disabled .leg-label{text-decoration:line-through;opacity:.4}
.leg-label{flex:1}
.leg-check{font-size:11px;color:#22c55e;opacity:0;transition:opacity .15s}
.leg-item.active .leg-check{opacity:1}
.leg-divider{border-top:1px solid #e5e7eb;margin:8px 0}

/* 右侧信息面板 */
.info{position:fixed;top:60px;right:20px;width:320px;background:#ffffffdd;backdrop-filter:blur(10px);border-radius:12px;padding:16px;font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,.08);display:none;max-height:80vh;overflow-y:auto;z-index:20}
.info.show{display:block}
.info h3{font-size:15px;margin-bottom:8px;color:#1e293b}
.info .tag{display:inline-block;padding:2px 8px;background:#f1f5f9;border-radius:6px;font-size:11px;margin:2px;color:#475569}
.info .imp{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;margin:2px;font-weight:600}
.info .imp-5{background:#fef2f2;color:#dc2626}
.info .imp-4{background:#fff7ed;color:#ea580c}
.info .imp-3{background:#fefce8;color:#ca8a04}
.info .imp-2{background:#f0fdf4;color:#16a34a}
.info .row{margin-top:8px;color:#64748b}
.info .row b{color:#334155}
.info .close{position:absolute;top:10px;right:14px;cursor:pointer;font-size:18px;color:#94a3b8}
.info .close:hover{color:#475569}
</style>
</head>
<body>

<div class="hdr">
  <div style="display:flex;align-items:center">
    <h1>🧬 生物化学知识图谱</h1>
    <span class="badge" id="st"></span>
  </div>
  <div>
    <input id="si" class="si" placeholder="搜索知识点...">
    <button id="br" class="btn">重置</button>
    <button id="btCross" class="btn">跨章依赖</button>
    <button id="btImp" class="btn">仅高重要度</button>
  </div>
</div>

<svg id="svg"></svg>
<div class="leg" id="legend"></div>
<div class="info" id="info">
  <span class="close" id="infoClose">✕</span>
  <div id="infoContent"></div>
</div>

<script>
(function(){

/* ========== 从 GRAPH_DATA 加载 ========== */
var D = GRAPH_DATA;
var R = D.root;
var chapters = D.chapters;
var crossRefs = D.crossRefs;

var exp = new Set();
var sim = null;
var showCross = false;
var showHighImpOnly = false;

/* 颜色映射：按章节 */
var chColors = {};
var palette = [
  "#3b82f6","#8b5cf6","#ec4899","#f97316","#eab308",
  "#22c55e","#14b8a6","#06b6d4","#6366f1","#a855f7",
  "#f43f5e","#84cc16","#d946ef","#0ea5e9","#fb923c","#10b981"
];
chapters.forEach(function(ch, i) { chColors[ch.id] = palette[i % palette.length]; });

/* 重要度颜色 */
function impColor(imp) {
  return imp >= 5 ? "#dc2626" : imp >= 4 ? "#ea580c" : imp >= 3 ? "#eab308" : "#22c55e";
}

/* 图例：层级 + 章节切换 */
var lvVisible = {0:true, 1:true, 2:true, 3:true};
var lvMeta = [
  {lv:0, name:"学科根", color:"#1e293b"},
  {lv:1, name:"章 (" + D.stats.chapters + ")", color:"#3b82f6"},
  {lv:2, name:"节 (" + D.stats.sections + ")", color:"#93c5fd"},
  {lv:3, name:"小节 (" + D.stats.subsections + ")", color:"#c7d2fe"}
];

function renderLegend() {
  var el = document.getElementById("legend");
  var h = '<div class="leg-title">层级控制</div>';
  lvMeta.forEach(function(m) {
    var cls = lvVisible[m.lv] ? 'leg-item active' : 'leg-item disabled';
    h += '<div class="' + cls + '" data-lv="' + m.lv + '">' +
      '<span class="leg-dot" style="background:' + m.color + '"></span>' +
      '<span class="leg-label">' + m.name + '</span>' +
      '<span class="leg-check">' + (lvVisible[m.lv] ? '✓' : '') + '</span></div>';
  });
  h += '<div class="leg-divider"></div>';
  h += '<div class="leg-title">章节（点击展开/折叠）</div>';
  chapters.forEach(function(ch) {
    var active = exp.has(ch.id);
    var cls = active ? 'leg-item active' : 'leg-item';
    h += '<div class="' + cls + '" data-ch="' + ch.id + '">' +
      '<span class="leg-dot" style="background:' + chColors[ch.id] + '"></span>' +
      '<span class="leg-label">' + ch.name + '</span></div>';
  });
  el.innerHTML = h;

  el.querySelectorAll('[data-lv]').forEach(function(item) {
    item.onclick = function() {
      var lv = +this.getAttribute('data-lv');
      if (lv === 0) return;
      lvVisible[lv] = !lvVisible[lv];
      renderLegend();
      go();
    };
  });
  el.querySelectorAll('[data-ch]').forEach(function(item) {
    item.onclick = function() {
      var chId = this.getAttribute('data-ch');
      if (exp.has(chId)) exp.delete(chId); else exp.add(chId);
      renderLegend();
      go();
    };
  });
}

/* ========== 构建节点和边 ========== */
function mk() {
  var ns = [], ls = [];

  if (lvVisible[0]) ns.push({id:R.id, name:R.name, lv:0, r:40, fixed:true});

  chapters.forEach(function(ch) {
    if (lvVisible[1]) {
      ns.push({id:ch.id, name:ch.name, lv:1, r:24, hk:true, importance:ch.importance, chColor:chColors[ch.id]});
      if (lvVisible[0]) ls.push({source:R.id, target:ch.id});
    }
    ch.sections.forEach(function(sec) {
      if (lvVisible[2] && exp.has(ch.id)) {
        // 高重要度过滤
        if (showHighImpOnly && sec.importance < 4) return;
        ns.push({id:sec.id, name:sec.name, lv:2, r:14, hk:true, importance:sec.importance, chColor:chColors[ch.id], tags:sec.tags, section_code:sec.section_code});
        if (lvVisible[1]) ls.push({source:ch.id, target:sec.id});
      }
      if (lvVisible[3] && exp.has(ch.id)) {
        sec.subsections.forEach(function(sub) {
          if (showHighImpOnly && sub.importance < 4) return;
          ns.push({id:sub.id, name:sub.name, lv:3, r:10, importance:sub.importance, chColor:chColors[ch.id], tags:sub.tags, section_code:sub.section_code});
          ls.push({source:sec.id, target:sub.id});
        });
      }
    });
  });

  // 跨章依赖边
  if (showCross) {
    var idSet = new Set(ns.map(function(n){return n.id}));
    crossRefs.forEach(function(ref) {
      if (idSet.has(ref.source) && idSet.has(ref.target)) {
        ls.push({source:ref.source, target:ref.target, cross:true});
      }
    });
  }

  return {ns:ns, ls:ls};
}

/* ========== D3 渲染 ========== */
function go() {
  var svg = d3.select("#svg");
  var w = window.innerWidth;
  var h = window.innerHeight - 60;
  svg.attr("width", w).attr("height", h);
  svg.selectAll("*").remove();
  var g = svg.append("g");

  var zoom = d3.zoom().scaleExtent([0.1, 8])
    .on("zoom", function(e){g.attr("transform", e.transform)});
  svg.call(zoom);

  if (sim) sim.stop();
  var d = mk();

  var term = document.getElementById("si").value.toLowerCase();
  var match = new Set();
  if (term) d.ns.forEach(function(n){
    if (n.name.toLowerCase().includes(term)) match.add(n.id);
  });

  document.getElementById("st").textContent = "节点 " + d.ns.length + " · 连接 " + d.ls.length + " · 跨章依赖 " + D.stats.crossRefs;

  sim = d3.forceSimulation(d.ns)
    .force("link", d3.forceLink(d.ls).id(function(d){return d.id}).distance(function(d){
      return d.cross ? 250 : 120;
    }))
    .force("charge", d3.forceManyBody().strength(function(d){
      return d.lv==0?-1500:d.lv==1?-500:d.lv==2?-200:-80;
    }))
    .force("center", d3.forceCenter(w/2, h/2));

  var link = g.selectAll("line").data(d.ls).join("line")
    .attr("stroke", function(d){return d.cross ? "#f87171" : "#cbd5e1"})
    .attr("stroke-opacity", function(d){return d.cross ? 0.4 : 0.6})
    .attr("stroke-dasharray", function(d){return d.cross ? "6,3" : "none"})
    .attr("stroke-width", function(d){return d.cross ? 1.5 : 1});

  var node = g.selectAll("g").data(d.ns).join("g")
    .style("cursor", "pointer");

  node.append("circle")
    .attr("r", function(d){return d.r})
    .attr("fill", function(d){
      if (term && match.has(d.id)) return "#22c55e";
      if (d.lv === 0) return "#1e293b";
      return d.chColor || "#93c5fd";
    })
    .attr("stroke", function(d){
      if (d.importance >= 5) return "#dc2626";
      return "#fff";
    })
    .attr("stroke-width", function(d){
      return d.importance >= 5 ? 3 : 2;
    });

  node.append("text")
    .text(function(d){return d.name})
    .attr("dy", function(d){return d.r + 14})
    .attr("text-anchor", "middle")
    .attr("font-size", function(d){return d.lv==0?14:d.lv==1?11:d.lv==2?10:9})
    .attr("fill", "#475569")
    .style("pointer-events", "none");

  node.on("mouseover", function(e, d){
    d3.select(this).select("circle").transition().duration(150).attr("r", d.r * 1.3);
  });
  node.on("mouseout", function(e, d){
    d3.select(this).select("circle").transition().duration(150).attr("r", d.r);
  });
  node.on("click", function(e, d){
    if (d.hk || d.lv === 1) {
      if (exp.has(d.id)) exp.delete(d.id); else exp.add(d.id);
      renderLegend();
      go();
    } else {
      showInfo(d);
    }
  });

  sim.on("tick", function(){
    link.attr("x1",function(d){return d.source.x}).attr("y1",function(d){return d.source.y})
      .attr("x2",function(d){return d.target.x}).attr("y2",function(d){return d.target.y});
    node.attr("transform",function(d){return "translate("+d.x+","+d.y+")"});
  });
}

/* ========== 信息面板 ========== */
function showInfo(d) {
  var el = document.getElementById("info");
  var c = document.getElementById("infoContent");

  // 从数据中查找完整信息
  var nodeData = null;
  chapters.forEach(function(ch) {
    ch.sections.forEach(function(sec) {
      if (sec.id === d.id) nodeData = sec;
      sec.subsections.forEach(function(sub) {
        if (sub.id === d.id) nodeData = sub;
      });
    });
  });

  var html = '<h3>' + d.name + '</h3>';
  if (nodeData) {
    html += '<div><span class="imp imp-' + Math.min(nodeData.importance, 5) + '">重要度 ' + nodeData.importance + '/5</span></div>';
    if (nodeData.tags && nodeData.tags.length) {
      html += '<div style="margin-top:6px">';
      nodeData.tags.forEach(function(t){ html += '<span class="tag">' + t + '</span>'; });
      html += '</div>';
    }
    if (nodeData.section_code) {
      html += '<div class="row">编号: <b>' + nodeData.section_code + '</b></div>';
    }
    if (nodeData.prerequisites && nodeData.prerequisites.length) {
      html += '<div class="row"><b>前置依赖:</b></div><div>';
      nodeData.prerequisites.forEach(function(pid) {
        var found = null;
        chapters.forEach(function(ch){ ch.sections.forEach(function(s){
          if(s.id===pid) found=s.name;
          s.subsections.forEach(function(ss){ if(ss.id===pid) found=ss.name; });
        });});
        html += '<span class="tag">' + (found||pid) + '</span>';
      });
      html += '</div>';
    }
    if (nodeData.related && nodeData.related.length) {
      html += '<div class="row"><b>关联:</b></div><div>';
      nodeData.related.forEach(function(rid) {
        var found = null;
        chapters.forEach(function(ch){ ch.sections.forEach(function(s){
          if(s.id===rid) found=s.name;
          s.subsections.forEach(function(ss){ if(ss.id===rid) found=ss.name; });
        });});
        html += '<span class="tag">' + (found||rid) + '</span>';
      });
      html += '</div>';
    }
  } else {
    html += '<div class="row">点击节点查看详情</div>';
  }

  c.innerHTML = html;
  el.classList.add("show");
}

document.getElementById("infoClose").onclick = function() {
  document.getElementById("info").classList.remove("show");
};

/* ========== 按钮绑定 ========== */
document.getElementById("btCross").onclick = function(){
  showCross = !showCross;
  this.classList.toggle("active", showCross);
  go();
};
document.getElementById("btImp").onclick = function(){
  showHighImpOnly = !showHighImpOnly;
  this.classList.toggle("active", showHighImpOnly);
  go();
};
document.getElementById("si").addEventListener("input", go);
document.getElementById("br").onclick = function(){
  exp = new Set();
  showCross = false;
  showHighImpOnly = false;
  document.getElementById("si").value = "";
  document.getElementById("btCross").classList.remove("active");
  document.getElementById("btImp").classList.remove("active");
  lvVisible = {0:true, 1:true, 2:true, 3:true};
  renderLegend();
  go();
};

renderLegend();
window.addEventListener("resize", go);
go();

})();
</script>
</body>
</html>
