<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>生物化学知识图谱</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f8f9fa;color:#2c3e50;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden}
.hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;background:#fff;border-bottom:1px solid #e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.hdr h1{font-size:18px;font-weight:600}
.badge{background:#ebf4ff;color:#3182ce;font-size:12px;padding:3px 10px;border-radius:12px;margin-left:14px}
.hdr-r{display:flex;gap:8px;align-items:center}
.si{background:#f7fafc;border:1px solid #e2e8f0;color:#2d3748;padding:7px 12px;border-radius:8px;font-size:13px;width:180px;outline:none}
.btn{background:#edf2f7;border:1px solid #e2e8f0;color:#4a5568;padding:7px 14px;border-radius:8px;font-size:12px;cursor:pointer}
svg{display:block;background:#f8f9fa}
.leg{position:fixed;bottom:14px;left:14px;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:12px 16px;font-size:12px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.leg-t{color:#718096;margin-bottom:6px;font-weight:600;font-size:11px}
.leg-i{display:flex;align-items:center;gap:8px;margin:4px 0;color:#4a5568}
.dot{border-radius:50%;flex-shrink:0}
.hint{position:fixed;bottom:14px;right:14px;color:#a0aec0;font-size:11px}
</style>
</head>
<body>
<div class="hdr">
  <div style="display:flex;align-items:center">
    <h1>🧬 生物化学知识图谱</h1>
    <span class="badge" id="st"></span>
  </div>
  <div class="hdr-r">
    <input class="si" id="si" placeholder="🔍 搜索知识点...">
    <button class="btn" id="br">重置</button>
  </div>
</div>
<svg id="svg"></svg>
<div class="leg">
  <div class="leg-t">图例</div>
  <div class="leg-i"><div class="dot" style="background:#2c3e50;width:14px;height:14px"></div>学科根节点</div>
  <div class="leg-i"><div class="dot" style="background:#3498db;width:10px;height:10px"></div>章节点（点击展开）</div>
  <div class="leg-i"><div class="dot" style="background:#85c1e9;width:8px;height:8px"></div>节节点</div>
  <div style="margin-top:6px;color:#a0aec0">同章色系 · 越深越细</div>
</div>
<div class="hint">滚轮缩放 · 拖拽移动 · 点击展开</div>
<script src="d3.min.js"></script>
<script>
(function(){
  var R={id:"biochem",name:"生物化学"};
  var CH=[
    {id:"biochem_1",n:"绪论",k:["生物化学的内容","生物化学的产生与发展","生物化学的知识框架和学习方法"]},
    {id:"biochem_2",n:"蛋白质",k:["蛋白质的分类","蛋白质的组成单位——氨基酸","肽","蛋白质的结构","蛋白质结构与功能的关系","蛋白质的性质与分离、分析技术"]},
    {id:"biochem_3",n:"核酸",k:["核酸的组成成分","核酸的一级结构","DNA的二级结构","DNA的高级结构","DNA和基因组","RNA的结构和功能","核酸的性质和研究方法","核酸的序列测定"]},
    {id:"biochem_4",n:"糖类",k:["单糖","重要单糖及其衍生物","寡糖","多糖","糖复合物","糖类研究方法"]},
    {id:"biochem_5",n:"脂质和生物膜",k:["三酰甘油","脂肪酸","磷脂","鞘脂","类固醇","生物膜"]},
    {id:"biochem_6",n:"酶",k:["酶的概念与特点","酶的化学本质与组成","酶的命名与分类","酶的结构与功能","酶的专一性","酶的作用机制","酶促反应动力学","影响酶促反应速率的因素","酶活性的调节","酶的研究方法与酶工程"]},
    {id:"biochem_7",n:"维生素和辅酶",k:["脂溶性维生素","水溶性维生素"]},
    {id:"biochem_8",n:"新陈代谢总论与生物氧化",k:["新陈代谢总论","生物氧化"]},
    {id:"biochem_9",n:"糖代谢",k:["多糖和低聚糖的酶促降解","糖的分解代谢","糖的合成代谢"]},
    {id:"biochem_10",n:"脂质代谢",k:["脂质的酶促水解","三酰甘油的分解代谢","三酰甘油的合成代谢","磷脂的代谢","胆固醇的代谢"]},
    {id:"biochem_11",n:"蛋白质的降解和氨基酸代谢",k:["蛋白质的酶促降解","氨基酸的分解代谢","氨基酸合成代谢"]},
    {id:"biochem_12",n:"核苷酸代谢",k:["核酸的酶促降解","核苷酸的分解","核苷酸的生物合成","核苷酸生物合成的调节","核苷酸合成的抗代谢物","辅酶核苷酸的生物合成"]},
    {id:"biochem_13",n:"DNA的生物合成",k:["DNA复制的概况","原核生物DNA的复制","真核生物DNA的复制","逆转录作用","DNA的损伤与修复","DNA重组和克隆"]},
    {id:"biochem_14",n:"RNA的生物合成",k:["RNA生物合成的概况","原核生物的转录","真核生物的转录","转录调控的特点","转录的选择性抑制","转录产物的加工","RNA的复制"]},
    {id:"biochem_15",n:"蛋白质的生物合成",k:["蛋白质合成体系","蛋白质的合成过程","蛋白质合成后的加工","蛋白质合成所需的能量","蛋白质的定向转运","蛋白质合成的抑制剂","寡肽的生物合成"]},
    {id:"biochem_16",n:"物质代谢的调节控制",k:["物质代谢的相互联系","分子水平的调节","细胞水平的调节","多细胞整体水平的调节"]}
  ];
  var COL=[
    ["#c0392b","#e74c3c","#f1948a"],["#2980b9","#3498db","#85c1e9"],["#8e44ad","#9b59b6","#c39bd3"],
    ["#27ae60","#2ecc71","#82e0aa"],["#d35400","#e67e22","#f0b27a"],["#16a085","#1abc9c","#76d7c4"],
    ["#f39c12","#f1c40f","#f9e154"],["#e74c3c","#ec7063","#f5b7b1"],["#2ecc71","#58d68d","#abebc6"],
    ["#e67e22","#f0b27a","#fad7a0"],["#3498db","#7fb3d8","#aed6f1"],["#9b59b6","#bb8fce","#d7bde2"],
    ["#1abc9c","#48c9b0","#a3e4d7"],["#c0392b","#d98880","#e6b0aa"],["#2c3e50","#5d6d7e","#aeb6bf"],
    ["#7d3c98","#a569bd","#d2b4de"]
  ];
  var exp=new Set(["biochem"]);
  var sim=null;
  var SR=40,S1=24,S2=14;

  function mk(){
    var ns=[],ls=[];
    ns.push({id:R.id,name:R.name,lv:0,r:SR,c:"#2c3e50",sc:"#1a252f"});
    CH.forEach(function(ch,ci){
      if(!exp.has("biochem"))return;
      var co=COL[ci];
      ns.push({id:ch.id,name:ch.n,lv:1,r:S1,c:co[1],sc:co[0],hk:true,op:exp.has(ch.id)});
      ls.push({s:R.id,t:ch.id});
      if(exp.has(ch.id)){
        ch.k.forEach(function(k,i){
          ns.push({id:ch.id+"_"+i,name:k,lv:2,r:S2,c:co[2],sc:co[1],hk:false});
          ls.push({s:ch.id,t:ch.id+"_"+i});
        });
      }
    });
    return{ns:ns,ls:ls};
  }

  function go(){
    var el=document.getElementById("svg");
    var w=window.innerWidth;
    var h=window.innerHeight-52;
    el.setAttribute("width",w);
    el.setAttribute("height",h);

    d3.select("#svg").selectAll("*").remove();
    var svg=d3.select("#svg");
    var g=svg.append("g");
    var zm=d3.zoom().scaleExtent([0.3,5]).on("zoom",function(e){g.attr("transform",e.transform)});
    svg.call(zm);
    svg.call(zm.transform,d3.zoomIdentity.translate(w/2,h/2));

    if(sim)sim.stop();
    var d=mk();
    var term=document.getElementById("si").value.toLowerCase();
    var mt=new Set();
    if(term)d.ns.forEach(function(n){if(n.name.toLowerCase().indexOf(term)>=0)mt.add(n.id)});

    var ec=exp.size-1;
    document.getElementById("st").textContent=CH.length+" 章节 · "+CH.reduce(function(s,c){return s+c.k.length},0)+" 小节 · 展开 "+ec+"/"+CH.length;

    sim=d3.forceSimulation(d.ns)
      .force("link",d3.forceLink(d.ls).id(function(n){return n.id}).distance(function(l){return l.source.lv===0?170:100}))
      .force("charge",d3.forceManyBody().strength(function(n){return n.lv===0?-1200:n.lv===1?-500:-160}))
      .force("collision",d3.forceCollide().radius(function(n){return n.r+15}))
      .force("x",d3.forceX().strength(0.02))
      .force("y",d3.forceY().strength(0.02));

    g.append("g").selectAll("line").data(d.ls).join("line")
      .attr("stroke","#cbd5e0").attr("stroke-width",function(l){return l.source.lv===0?1.5:1}).attr("stroke-opacity",0.6);

    var nd=g.append("g").selectAll("g").data(d.ns).join("g")
      .style("cursor",function(n){return n.hk?"pointer":"default"})
      .call(d3.drag()
        .on("start",function(e,n){if(!e.active)sim.alphaTarget(0.3).restart();n.fx=n.x;n.fy=n.y})
        .on("drag",function(e,n){n.fx=e.x;n.fy=e.y})
        .on("end",function(e,n){if(!e.active)sim.alphaTarget(0);n.fx=null;n.fy=null}));

    nd.append("circle")
      .attr("r",function(n){return n.r})
      .attr("fill",function(n){return term&&mt.has(n.id)?"#48bb78":n.c})
      .attr("fill-opacity",function(n){return term&&!mt.has(n.id)&&mt.size>0?0.2:1})
      .attr("stroke",function(n){return term&&mt.has(n.id)?"#276749":n.sc||"none"})
      .attr("stroke-width",function(n){return n.lv===2?1.5:2});

    nd.filter(function(n){return n.hk}).append("text")
      .attr("text-anchor","middle").attr("dy",function(n){return n.r+14})
      .attr("fill","#a0aec0").attr("font-size","10px")
      .text(function(n){return n.op?"▾":"▸"});

    nd.append("text")
      .attr("text-anchor","middle")
      .attr("dy",function(n){return n.hk?n.r+28:n.r+16})
      .attr("fill",function(n){return term&&mt.has(n.id)?"#276749":n.lv===0?"#1a202c":n.lv===1?"#2d3748":"#718096"})
      .attr("font-size",function(n){return n.lv===0?"15px":n.lv===1?"12px":"10px"})
      .attr("font-weight",function(n){return n.lv<=1?"600":"normal"})
      .text(function(n){var m=n.lv===0?12:n.lv===1?8:6;return n.name.length>m?n.name.slice(0,m)+"…":n.name});

    nd.on("click",function(e,n){
      e.stopPropagation();
      if(n.hk){if(exp.has(n.id))exp.delete(n.id);else exp.add(n.id)}
      go();
    });

    sim.on("tick",function(){
      g.selectAll("line")
        .attr("x1",function(l){return l.source.x}).attr("y1",function(l){return l.source.y})
        .attr("x2",function(l){return l.target.x}).attr("y2",function(l){return l.target.y});
      nd.attr("transform",function(n){return"translate("+n.x+","+n.y+")"});
    });
  }

  document.getElementById("si").addEventListener("input",go);
  document.getElementById("br").addEventListener("click",function(){exp=new Set(["biochem"]);document.getElementById("si").value="";go()});
  window.addEventListener("resize",go);
  go();
})();
</script>
</body>
</html>
